<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reproduce — ML Paper Reproduction Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f5f5f7;
  --bg-2:#fbfbfc;
  --panel:#ffffff;
  --border:#eaeaee;
  --border-2:#e0e0e6;
  --ink:#191920;
  --ink-2:#3f3f48;
  --muted:#74747f;
  --faint:#a3a3ad;
  --accent:#7c3aed;
  --accent-ink:#6d28d9;
  --accent-2:#8b5cf6;
  --accent-soft:#f3effe;
  --accent-soft-2:#ebe3fd;
  --accent-border:#e0d4fb;
  --ok:#177245;
  --ok-soft:#e9f4ed;
  --ok-border:#c9e6d4;
  --warn:#b45309;
  --warn-soft:#fbf0df;
  --warn-border:#f0dcb6;
  --risk:#d11f3c;
  --risk-soft:#fceaed;
  --risk-border:#f6ccd4;
  --r-lg:14px; --r:11px; --r-sm:8px; --r-xs:6px;
  --shadow-sm:0 1px 2px rgba(24,24,30,.05), 0 1px 1px rgba(24,24,30,.04);
  --shadow:0 6px 22px -8px rgba(24,24,30,.14), 0 2px 6px -2px rgba(24,24,30,.06);
  --shadow-lg:0 24px 60px -16px rgba(24,24,30,.22), 0 8px 20px -8px rgba(24,24,30,.1);
  --mono:'Geist Mono','SF Mono',ui-monospace,Menlo,monospace;
  --sans:'Geist','SF Pro Text',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:-0.006em;
}
#root{height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit}
::selection{background:var(--accent-soft-2)}
.mono{font-family:var(--mono);letter-spacing:0}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d8d8de;border-radius:20px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#c4c4cc;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ---------- icons ---------- */
.ic{display:inline-block;flex-shrink:0;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-weight:540;font-size:13.5px;line-height:1;border-radius:var(--r-sm);
  padding:0 14px;height:36px;transition:.14s ease;white-space:nowrap;
  border:1px solid transparent;letter-spacing:-0.01em}
.btn:active{transform:translateY(.5px)}
.btn-pri{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(108,43,217,.28),inset 0 1px 0 rgba(255,255,255,.16)}
.btn-pri:hover{background:var(--accent-ink)}
.btn-pri:disabled{background:#cbbef0;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:var(--panel);color:var(--ink-2);border-color:var(--border-2)}
.btn-ghost:hover{background:var(--bg-2);border-color:#d2d2da;color:var(--ink)}
.btn-soft{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent-border)}
.btn-soft:hover{background:var(--accent-soft-2)}
.btn-sm{height:30px;padding:0 11px;font-size:12.5px;border-radius:var(--r-xs)}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--r-sm)}

/* ---------- tags / chips ---------- */
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:560;
  padding:3px 8px;border-radius:999px;line-height:1.3;border:1px solid transparent;letter-spacing:-0.005em}
.tag .ic{margin:-1px 0}
.tag-neutral{background:#f2f2f4;color:var(--muted);border-color:#e8e8ec}
.tag-accent{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent-border)}
.tag-ok{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
.tag-warn{background:var(--warn-soft);color:var(--warn);border-color:var(--warn-border)}
.tag-risk{background:var(--risk-soft);color:var(--risk);border-color:var(--risk-border)}
.mono-chip{font-family:var(--mono);font-size:11.5px;background:#f4f4f6;border:1px solid #ebebef;
  color:var(--ink-2);padding:2px 7px;border-radius:var(--r-xs);letter-spacing:0;white-space:nowrap}

/* ---------- dots ---------- */
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot-ok{background:var(--ok)}
.dot-run{background:var(--accent)}
.dot-wait{background:#cfcfd6}
.dot-risk{background:var(--risk)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(124,58,237,.4)}70%{box-shadow:0 0 0 6px rgba(124,58,237,0)}100%{box-shadow:0 0 0 0 rgba(124,58,237,0)}}
.dot-run.live{animation:ring 1.8s ease-out infinite}

/* ---------- panel ---------- */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.panel-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border)}
.panel-title{font-size:13px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.panel-sub{font-size:12px;color:var(--muted)}

/* ---------- app shell ---------- */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:54px;flex-shrink:0;display:flex;align-items:center;gap:14px;
  padding:0 18px;background:rgba(251,251,252,.85);backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--border);z-index:30}
.brand{display:flex;align-items:center;gap:9px;font-weight:640;font-size:15px;letter-spacing:-0.02em}
.brand-mark{width:27px;height:27px;border-radius:8px;background:linear-gradient(150deg,#8b5cf6,#6d28d9);
  display:grid;place-items:center;color:#fff;box-shadow:0 2px 6px -1px rgba(108,43,217,.5),inset 0 1px 0 rgba(255,255,255,.3)}
.crumb{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;min-width:0}
.crumb b{color:var(--ink);font-weight:560}
.sep{color:#d0d0d6}
.spacer{flex:1}
.workzone{flex:1;display:flex;min-height:0}

/* left rail */
.rail{width:278px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg-2);
  display:flex;flex-direction:column;overflow-y:auto}
.rail-sec{padding:15px 15px 5px}
.rail-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);
  padding:0 4px 9px;display:flex;align-items:center;justify-content:space-between}

/* center */
.center{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.center-scroll{flex:1;overflow-y:auto;padding:18px 20px 28px}

/* chat rail */
.chat{width:372px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg-2);
  display:flex;flex-direction:column;min-height:0}

/* ---------- dashboard ---------- */
.dash{height:100%;display:flex;flex-direction:column;background:var(--bg)}
.dash-top{height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;background:rgba(251,251,252,.85);backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid var(--border)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;
  padding:28px;overflow-y:auto;align-content:start}
.sess-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;
  cursor:pointer;transition:.14s;animation:msgin .3s ease both}
.sess-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow)}
.sess-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sess-repo{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:540;color:var(--muted);
  font-family:var(--mono);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-del{color:var(--faint);transition:.12s;padding:3px;border-radius:5px;flex-shrink:0}
.sess-del:hover{color:var(--risk);background:var(--risk-soft)}
.sess-title{font-size:13.5px;font-weight:580;letter-spacing:-0.01em;line-height:1.35;margin-bottom:10px;color:var(--ink)}
.sess-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sess-footer{display:flex;align-items:center;justify-content:space-between}
.sess-files{font-size:11.5px;color:var(--faint);font-family:var(--mono)}
.dash-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;padding:40px;color:var(--ink)}
.dash-empty-ic{width:64px;height:64px;border-radius:18px;background:var(--accent-soft);
  display:grid;place-items:center;color:var(--accent-ink);margin:0 auto 20px;border:1px solid var(--accent-border)}

/* ---------- input page ---------- */
.input-page{height:100%;display:flex;flex-direction:column;background:var(--bg)}
.input-topbar{height:54px;flex-shrink:0;display:flex;align-items:center;padding:0 18px;
  background:rgba(251,251,252,.85);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--border)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
  padding:6px 10px;border-radius:var(--r-sm);transition:.12s}
.back-btn:hover{background:var(--bg);color:var(--ink)}

/* ---------- file viewer ---------- */
.file-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-sm);
  width:100%;text-align:left;transition:.12s;color:var(--ink-2);font-size:13px;cursor:pointer;
  border:1px solid transparent}
.file-item:hover{background:#f1f1f3}
.file-item.on{background:var(--panel);border-color:var(--border-2);color:var(--ink);font-weight:560;box-shadow:var(--shadow-sm)}
.file-item.on .ic{color:var(--accent-ink)}
.file-name{font-family:var(--mono);font-size:12.5px;letter-spacing:0}
.file-viewer-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;
  border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
.file-content{flex:1;display:flex;overflow:auto;font-family:var(--mono);font-size:12.5px;line-height:1.75;
  background:#fafafa;min-height:0}
.line-nums{padding:14px 0 14px 14px;text-align:right;color:#c0c0c8;user-select:none;flex-shrink:0;
  display:flex;flex-direction:column}
.line-nums span{display:block;min-width:32px;font-size:12px}
.line-code{padding:14px 18px;flex:1;display:flex;flex-direction:column;overflow-x:auto;min-width:0}
.line-code span{display:block;white-space:pre;color:var(--ink-2)}
.line-code .ck{color:#7c3aed;font-weight:560}
.line-code .cc{color:#a0a0b0;font-style:italic}
.line-code .cm-h{color:var(--ink);font-weight:660}
.line-code .cm-t{color:var(--muted)}
.line-code .cm-li{color:var(--ink-2)}

/* ---------- risks in rail (compact) ---------- */
.risk-mini{display:flex;align-items:flex-start;gap:8px;padding:6px 4px;border-bottom:1px dashed var(--border)}
.risk-mini:last-child{border-bottom:none}
.risk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sev-dot-high{background:var(--risk)}
.sev-dot-med{background:var(--warn)}
.sev-dot-low{background:var(--ok)}
.risk-mini-name{font-size:11.5px;color:var(--ink-2);line-height:1.4}

/* ---------- env row ---------- */
.env-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--border)}
.env-row:last-child{border-bottom:none}
.env-k{font-size:12px;color:var(--muted)}
.env-v{font-family:var(--mono);font-size:11.5px;font-weight:540;color:var(--ink)}

/* ---------- chat ---------- */
.chat-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:100%}
.msg-av{width:27px;height:27px;border-radius:7px;flex-shrink:0;display:grid;place-items:center;font-size:11px;font-weight:640}
.av-agent{background:linear-gradient(150deg,#8b5cf6,#6d28d9);color:#fff;box-shadow:0 1px 3px rgba(108,43,217,.4)}
.av-user{background:#e9e9ed;color:var(--muted)}
.msg-body{min-width:0;flex:1}
.msg-name{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:3px}
.bubble{font-size:13px;line-height:1.6;color:var(--ink-2)}
.msg-user .bubble{background:var(--panel);border:1px solid var(--border);padding:9px 12px;border-radius:10px;border-top-left-radius:3px}
.bubble code{font-family:var(--mono);font-size:11.5px;background:#f1f1f4;border:1px solid #e8e8ec;padding:1px 5px;border-radius:5px}
.bubble b,.bubble strong{color:var(--ink);font-weight:600}
.bubble p{margin:0 0 6px}.bubble p:last-child{margin-bottom:0}
.bubble ul,.bubble ol{margin:4px 0 6px;padding-left:18px}
.bubble li{margin:2px 0}
.bubble-card{margin-top:9px;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--bg-2)}
.bc-head{padding:8px 11px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.03em}
.bc-row{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;font-size:12px}
.bc-row+.bc-row{border-top:1px solid var(--border)}
.delta-pos{color:var(--ok);font-family:var(--mono);font-weight:560}
.delta-neg{color:var(--risk);font-family:var(--mono);font-weight:560}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg{animation:msgin .32s cubic-bezier(.2,.7,.3,1) both}

.typing{display:flex;gap:4px;padding:4px 2px}
.typing i{width:6px;height:6px;border-radius:50%;background:#c3c3cc;animation:tdot 1.2s infinite}
.typing i:nth-child(2){animation-delay:.18s}
.typing i:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.chat-input{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-2)}
.suggest{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{font-size:11.5px;font-weight:520;padding:5px 10px;border-radius:999px;background:var(--panel);
  border:1px solid var(--border-2);color:var(--ink-2);transition:.12s;text-align:left}
.chip:hover{background:var(--accent-soft);border-color:var(--accent-border);color:var(--accent-ink)}
.composer{display:flex;align-items:flex-end;gap:8px;background:var(--panel);border:1px solid var(--border-2);
  border-radius:var(--r);padding:8px 8px 8px 13px;transition:.14s}
.composer:focus-within{border-color:var(--accent-2);box-shadow:0 0 0 3px var(--accent-soft)}
.composer textarea{flex:1;border:none;outline:none;resize:none;font-size:13.5px;line-height:1.5;
  max-height:120px;background:transparent;padding:4px 0}
.send-btn{width:32px;height:32px;border-radius:var(--r-sm);background:var(--accent);color:#fff;
  display:grid;place-items:center;flex-shrink:0;transition:.14s}
.send-btn:hover{background:var(--accent-ink)}
.send-btn:disabled{background:#d6cdf3;cursor:default}

/* ---------- input landing ---------- */
.land{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow-y:auto;padding:40px 24px;background:
    radial-gradient(120% 80% at 50% -10%, #f0ebfd 0%, rgba(245,245,247,0) 55%),var(--bg)}
.land-inner{width:100%;max-width:620px;animation:msgin .5s ease both}
.land-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:560;color:var(--accent-ink);
  background:var(--panel);border:1px solid var(--accent-border);padding:5px 12px 5px 9px;border-radius:999px;box-shadow:var(--shadow-sm)}
.land h1{font-size:33px;line-height:1.12;font-weight:660;letter-spacing:-0.03em;margin:18px 0 10px}
.land h1 em{font-style:normal;color:var(--accent-ink)}
.land .lead{font-size:15.5px;color:var(--muted);line-height:1.55;max-width:520px}
.src-tabs{display:flex;gap:6px;margin:26px 0 0;background:var(--panel);padding:5px;border-radius:var(--r);
  border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.src-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:540;color:var(--muted);transition:.14s}
.src-tab:hover{background:var(--bg);color:var(--ink)}
.src-tab.on{background:var(--accent-soft);color:var(--accent-ink)}
.src-panel{margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:20px;box-shadow:var(--shadow)}
.drop{border:1.5px dashed var(--border-2);border-radius:var(--r);padding:30px 20px;text-align:center;
  transition:.16s;cursor:pointer;background:var(--bg-2)}
.drop:hover,.drop.hot{border-color:var(--accent-2);background:var(--accent-soft)}
.drop-ic{width:46px;height:46px;border-radius:12px;background:var(--accent-soft);color:var(--accent-ink);
  display:grid;place-items:center;margin:0 auto 12px;border:1px solid var(--accent-border)}
.field{display:flex;align-items:center;gap:10px;background:var(--bg-2);border:1px solid var(--border-2);
  border-radius:var(--r);padding:0 12px;height:48px;transition:.14s}
.field:focus-within{border-color:var(--accent-2);box-shadow:0 0 0 3px var(--accent-soft);background:var(--panel)}
.field input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:var(--mono);letter-spacing:0}
.field input::placeholder{font-family:var(--sans);color:var(--faint);letter-spacing:-0.005em}
.land-foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:14px}
.pdf-file{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--accent-soft);
  border:1px solid var(--accent-border);border-radius:var(--r);margin-top:14px}
.pdf-ic{width:36px;height:36px;border-radius:9px;background:#fff;color:var(--risk);display:grid;place-items:center;flex-shrink:0;border:1px solid var(--risk-border)}
.extracted{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ok);margin-top:12px;
  background:var(--ok-soft);border:1px solid var(--ok-border);padding:8px 11px;border-radius:var(--r-sm)}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px}
.ex-card{text-align:left;padding:12px 13px;border:1px solid var(--border);border-radius:var(--r-sm);
  background:var(--panel);transition:.14s}
.ex-card:hover{border-color:var(--accent-border);background:var(--accent-soft);box-shadow:var(--shadow-sm)}
.ex-card .ex-t{font-size:12.5px;font-weight:560;letter-spacing:-0.01em}
.ex-card .ex-s{font-size:11px;color:var(--faint);font-family:var(--mono);margin-top:3px}

/* analyzing overlay */
.analyzing{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  background:radial-gradient(120% 80% at 50% 0%, #f0ebfd 0%, rgba(245,245,247,0) 50%),var(--bg)}
.az-orb{width:74px;height:74px;border-radius:20px;background:linear-gradient(150deg,#8b5cf6,#6d28d9);
  display:grid;place-items:center;color:#fff;box-shadow:0 14px 40px -10px rgba(108,43,217,.6),inset 0 1px 0 rgba(255,255,255,.3);
  animation:orbp 2s ease-in-out infinite}
@keyframes orbp{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.03)}}
.az-list{width:340px;display:flex;flex-direction:column;gap:3px}
.az-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--r-sm);font-size:13px;
  color:var(--muted);transition:.3s}
.az-item.done{color:var(--ink)}
.az-item.now{color:var(--accent-ink);background:var(--panel);border:1px solid var(--accent-border);box-shadow:var(--shadow-sm)}
.az-check{width:20px;height:20px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;background:#eee}
.az-item.done .az-check{background:var(--ok-soft);color:var(--ok)}
.az-item.now .az-check{background:var(--accent);color:#fff}
